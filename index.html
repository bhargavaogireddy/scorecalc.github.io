<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Robin Tournament Manager</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .round-block {
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .round-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .matchup {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 2fr;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            background: #f3f4f6;
            padding: 0.75rem;
            border-radius: 6px;
        }

        .matchup .player-name {
            font-weight: 500;
        }

        .matchup .player-name.p2 {
            text-align: right;
        }

        .matchup input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f3f4f6;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Round Robin Tournament Manager</h1>
        <p>Input players, log scores, and view tie-broken standings dynamically.</p>
    </header>

    <div id="setup-stage" class="card">
        <h2>1. Enter Players</h2>
        <p>Enter one player name per line (minimum 2 players):</p>
        <textarea id="player-input" placeholder="Player 1&#10;Player 2&#10;Player 3&#10;Player 4"></textarea>
        <button onclick="generateTournament()">Generate Tournament</button>
    </div>

    <div id="tournament-stage" class="card hidden">
        <h2>2. Match Scores</h2>
        <div id="rounds-container"></div>
        <button onclick="calculateStandings()">Calculate Final Standings</button>
    </div>

    <div id="standings-stage" class="card hidden">
        <h2>3. Final Standings & Seeding</h2>
        <table id="standings-table">
            <thead>
                <tr>
                    <th>Seed</th>
                    <th>Player</th>
                    <th>Record (W-L)</th>
                    <th>Points For</th>
                    <th>Points Against</th>
                    <th>Differential</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <br>
        <button onclick="resetTournament()">Reset Tournament</button>
    </div>
</div>

<script>
    let players = [];
    let rounds = [];

    function generateTournament() {
        const rawInput = document.getElementById('player-input').value;
        // Split by lines and remove empty values
        const names = rawInput.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (names.length < 2) {
            alert("Please enter at least 2 players.");
            return;
        }

        // Initialize players array
        players = names.map((name, index) => ({
            id: index,
            name: name,
            wins: 0,
            losses: 0,
            pointsFor: 0,
            pointsAgainst: 0,
            differential: 0
        }));

        // Clone list to manipulate for Round Robin algorithm (Circle Method)
        let list = [...players];
        
        // If odd, add a dummy 'BYE' player
        const isOdd = list.length % 2 !== 0;
        if (isOdd) {
            list.push({ id: -1, name: 'BYE' });
        }

        const numPlayers = list.length;
        const numRounds = numPlayers - 1;
        const matchesPerRound = numPlayers / 2;

        rounds = [];

        // Generate Round Robin pairings using Circle Method
        for (let r = 0; r < numRounds; r++) {
            let roundMatches = [];
            for (let m = 0; m < matchesPerRound; m++) {
                let p1 = list[m];
                let p2 = list[numPlayers - 1 - m];

                // Skip matches involving the BYE dummy player
                if (p1.id !== -1 && p2.id !== -1) {
                    roundMatches.push({ p1: p1, p2: p2 });
                }
            }
            rounds.push(roundMatches);

            // Rotate list elements (leave first element fixed)
            list.splice(1, 0, list.pop());
        }

        // Shuffle rounds to randomize the order of play
        rounds.sort(() => Math.random() - 0.5);

        renderRounds();
        
        document.getElementById('setup-stage').classList.add('hidden');
        document.getElementById('tournament-stage').classList.remove('hidden');
    }

    function renderRounds() {
        const container = document.getElementById('rounds-container');
        container.innerHTML = '';

        rounds.forEach((round, roundIndex) => {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'round-block';
            
            const title = document.createElement('div');
            title.className = 'round-title';
            title.innerText = `Round ${roundIndex + 1}`;
            roundDiv.appendChild(title);

            round.forEach((match, matchIndex) => {
                const matchId = `r${roundIndex}m${matchIndex}`;
                
                const matchupDiv = document.createElement('div');
                matchupDiv.className = 'matchup';
                matchupDiv.innerHTML = `
                    <span class="player-name">${match.p1.name}</span>
                    <input type="number" id="${matchId}-s1" placeholder="Score" min="0">
                    <input type="number" id="${matchId}-s2" placeholder="Score" min="0">
                    <span class="player-name p2">${match.p2.name}</span>
                `;
                roundDiv.appendChild(matchupDiv);
            });

            container.appendChild(roundDiv);
        });
    }

    function calculateStandings() {
        // Reset player metrics before tabulating
        players.forEach(p => {
            p.wins = 0;
            p.losses = 0;
            p.pointsFor = 0;
            p.pointsAgainst = 0;
            p.differential = 0;
        });

        // Loop through inputs and tabulate results
        for (let r = 0; r < rounds.length; r++) {
            for (let m = 0; m < rounds[r].length; m++) {
                const matchId = `r${r}m${m}`;
                const s1Input = document.getElementById(`${matchId}-s1`).value;
                const s2Input = document.getElementById(`${matchId}-s2`).value;

                // Validation check to make sure scores are filled out
                if (s1Input === "" || s2Input === "") {
                    alert("Please fill out all match scores before finalizing standings.");
                    return;
                }

                const s1 = parseInt(s1Input, 10);
                const s2 = parseInt(s2Input, 10);

                let p1 = players.find(p => p.id === rounds[r][m].p1.id);
                let p2 = players.find(p => p.id === rounds[r][m].p2.id);

                p1.pointsFor += s1;
                p1.pointsAgainst += s2;
                p2.pointsFor += s2;
                p2.pointsAgainst += s1;

                if (s1 > s2) {
                    p1.wins += 1;
                    p2.losses += 1;
                } else if (s2 > s1) {
                    p2.wins += 1;
                    p1.losses += 1;
                } else {
                    // Tie scenario handling (adjust if your sport doesn't allow ties)
                    p1.wins += 0.5;
                    p1.losses += 0.5;
                    p2.wins += 0.5;
                    p2.losses += 0.5;
                }
            }
        }

        // Post-calculate differentials
        players.forEach(p => {
            p.differential = p.pointsFor - p.pointsAgainst;
        });

        // TIE BREAKER SORTING LOGIC:
        // 1. Wins (Descending)
        // 2. Point Differential (Descending)
        // 3. Total Points For (Descending)
        players.sort((a, b) => {
            if (b.wins !== a.wins) {
                return b.wins - a.wins;
            }
            if (b.differential !== a.differential) {
                return b.differential - a.differential;
            }
            return b.pointsFor - a.pointsFor;
        });

        renderStandings();
        document.getElementById('standings-stage').classList.remove('hidden');
        // Scroll down to see results
        document.getElementById('standings-stage').scrollIntoView({ behavior: 'smooth' });
    }

    function renderStandings() {
        const tbody = document.querySelector('#standings-table tbody');
        tbody.innerHTML = '';

        players.forEach((player, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>#${index + 1}</strong></td>
                <td>${player.name}</td>
                <td>${player.wins} - ${player.losses}</td>
                <td>${player.pointsFor}</td>
                <td>${player.pointsAgainst}</td>
                <td>${player.differential > 0 ? '+' : ''}${player.differential}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function resetTournament() {
        if(confirm("Are you sure you want to reset? This clears all current match scores.")) {
            document.getElementById('standings-stage').classList.add('hidden');
            document.getElementById('tournament-stage').classList.add('hidden');
            document.getElementById('setup-stage').classList.remove('hidden');
            document.getElementById('player-input').value = '';
        }
    }
</script>

</body>
</html>
